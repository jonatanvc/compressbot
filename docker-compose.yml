version: '3.8'

services:
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-local-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-data:/var/lib/telegram-bot-api  # ← volumen compartido
    expose:
      - "8081"
    networks:
      - dokploy-network

  compressbot:
    build: .
    container_name: compressbot
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      OWNER_USER_ID: ${OWNER_USER_ID}
      ALLOWED_USER_IDS: ${ALLOWED_USER_IDS}
      ONLY_PRIVATE_CHAT: ${ONLY_PRIVATE_CHAT}
      FAVORITES_CHANNEL_ID: ${FAVORITES_CHANNEL_ID}
      MAX_DOWNLOAD_CONCURRENCY: ${MAX_DOWNLOAD_CONCURRENCY}
      MAX_UPLOAD_CONCURRENCY: ${MAX_UPLOAD_CONCURRENCY}
      MAX_CONCURRENT_UPDATES: ${MAX_CONCURRENT_UPDATES}
      MAX_PARALLEL_HEAVY_JOBS: ${MAX_PARALLEL_HEAVY_JOBS}
      MAX_RETRIES: ${MAX_RETRIES}
      RETRY_BASE_DELAY: ${RETRY_BASE_DELAY}
      ENABLE_CHECKSUM: ${ENABLE_CHECKSUM}
      CHECKSUM_MAX_BYTES: ${CHECKSUM_MAX_BYTES}
      ZIP_COMPRESS_LEVEL: ${ZIP_COMPRESS_LEVEL}
      TELEGRAM_OPERATION_TIMEOUT: ${TELEGRAM_OPERATION_TIMEOUT}
      TELEGRAM_MAX_UPLOAD_BYTES: ${TELEGRAM_MAX_UPLOAD_BYTES}
      UPLOAD_PART_BYTES: ${UPLOAD_PART_BYTES}
      SINGLE_UPLOAD_MAX_BYTES: ${SINGLE_UPLOAD_MAX_BYTES}
      TELEGRAM_CONNECT_TIMEOUT: ${TELEGRAM_CONNECT_TIMEOUT}
      TELEGRAM_READ_TIMEOUT: ${TELEGRAM_READ_TIMEOUT}
      TELEGRAM_WRITE_TIMEOUT: ${TELEGRAM_WRITE_TIMEOUT}
      TELEGRAM_POOL_TIMEOUT: ${TELEGRAM_POOL_TIMEOUT}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-http://telegram-api:8081/bot}
      TELEGRAM_API_FILE_BASE_URL: ${TELEGRAM_API_FILE_BASE_URL:-http://telegram-api:8081/file/bot}
      TERABOX_PROXY: ${TERABOX_PROXY:-}
    depends_on:
      - telegram-api
    networks:
      - dokploy-network
    volumes:
      - telegram-data:/var/lib/telegram-bot-api:ro  # ← montar MISMO volumen (solo lectura)
      - temp-data:/app/temp

volumes:
  telegram-data:   # ← volumen compartido
  temp-data:

networks:
  dokploy-network:
    external: true
